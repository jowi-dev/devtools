[tools]
erlang = "latest"
elixir = "latest"
#elixir-ls = "latest"
ocaml = "latest"

# Expert - Official Elixir Language Server
[tools."http:expert"]
version = "v0.1.4"

[tools."http:expert".platforms]
macos-arm64 = { url = "https://github.com/elixir-lang/expert/releases/download/v0.1.4/expert_darwin_arm64" }
macos-x64 = { url = "https://github.com/elixir-lang/expert/releases/download/v0.1.4/expert_darwin_amd64" }
linux-x64 = { url = "https://github.com/elixir-lang/expert/releases/download/v0.1.4/expert_linux_amd64" }
linux-arm64 = { url = "https://github.com/elixir-lang/expert/releases/download/v0.1.4/expert_linux_arm64" }

# opam - OCaml package manager (provides ocamllsp, dune)
[tools."http:opam"]
version = "2.2.1"

[tools."http:opam".platforms]
macos-arm64 = { url = "https://github.com/ocaml/opam/releases/download/2.2.1/opam-2.2.1-arm64-macos" }
macos-x64 = { url = "https://github.com/ocaml/opam/releases/download/2.2.1/opam-2.2.1-x86_64-macos" }
linux-x64 = { url = "https://github.com/ocaml/opam/releases/download/2.2.1/opam-2.2.1-x86_64-linux" }
linux-arm64 = { url = "https://github.com/ocaml/opam/releases/download/2.2.1/opam-2.2.1-arm64-linux" }

[tasks.setup-ocaml-tools]
description = "Bootstrap opam and install OCaml dev tools (ocamllsp, dune)"
run = """
#!/usr/bin/env bash
set -e
eval "$(mise env --shell=bash)"
# Init opam using the mise-managed OCaml, no shell hook modifications
opam init --bare --no-setup --yes
# Create a switch using the OCaml already on PATH from mise
opam switch create default ocaml-system --no-install 2>/dev/null || echo "Switch already exists, continuing..."
eval "$(opam env)"
opam install -y ocaml-lsp-server dune
fish -c "fish_add_path ~/.opam/default/bin" 2>/dev/null || true
echo "OCaml tools installed. Path set universally — all fish sessions updated."
"""

[tasks.demos]
description = "Generate GIFs from all VHS tapes in demos/"
run = """
#!/usr/bin/env bash
set -e
cd demos
for tape in *.tape; do
  echo "Processing $tape..."
  vhs "$tape"
done
echo "All demos generated successfully!"
"""
